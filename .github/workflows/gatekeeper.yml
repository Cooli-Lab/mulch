name: Autonomous Gatekeeper

on:
  pull_request_target:
    types: [opened, synchronize]

# Sequential per-author execution avoids race conditions in the
# rate-limit checks (an author opening many PRs in parallel could
# otherwise have all of them pass the cap simultaneously).
concurrency:
  group: gatekeeper-${{ github.event.pull_request.user.login }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  notify-discord:
    # Pings the Herald's Discord webhook the moment a bot opens a PR.
    # Skips on `synchronize` so we don't ping for every additional commit.
    # Runs in parallel with `process-pr` so it doesn't block validation.
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Ping
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          BODY: ${{ github.event.pull_request.body }}
          CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping ping."
            exit 0
          fi
          python3 - <<'PY'
          import json, os, urllib.request
          title   = os.environ["PR_TITLE"]
          url     = os.environ["PR_URL"]
          author  = os.environ["AUTHOR"]
          body    = (os.environ.get("BODY") or "").strip()
          changed = os.environ.get("CHANGED_FILES") or "?"
          excerpt = body[:240] + ("…" if len(body) > 240 else "")
          msg = f"🤖 **New Mulch PR** from `@{author}` ({changed} files)\n**{title}**"
          if excerpt:
              msg += f"\n> {excerpt}"
          msg += f"\n{url}"
          req = urllib.request.Request(
              os.environ["WEBHOOK_URL"],
              method="POST",
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "cooli-herald/1.0 (+https://cooli.ai)",
              },
              data=json.dumps({"content": msg, "username": "The Herald"}).encode(),
          )
          urllib.request.urlopen(req, timeout=10)
          print("Posted to Discord.")
          PY

  process-pr:
    runs-on: ubuntu-latest
    steps:
      # NOTE: pull_request_target checks out the BASE branch (main).
      # The gatekeeper code that runs is the version on main, not the
      # version from the (potentially malicious) PR head. This is
      # intentional and load-bearing — do not change to pull_request.
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      # On pass: process_pr.py merges and comments success.
      # On violation: process_pr.py stages a verdict to .gatekeeper/
      # and exits 0; the next steps roast and seal it.
      - name: Validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
          AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}
        run: python scripts/process_pr.py

      # Optional: roast the rejected request via Claude.
      # `continue-on-error` means a missing OAuth token (or any action
      # failure) doesn't block the workflow — `seal.py` then falls back
      # to the bare violation message.
      - name: Roast
        if: hashFiles('.gatekeeper/violation.txt') != ''
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Read,Write --disallowedTools Bash,WebFetch,WebSearch,Edit,Glob,Grep,TodoWrite"
          prompt: |
            A bot's PR was rejected by the Autonomous Gatekeeper. Your job
            is to write the rejection comment as a short, dry roast.

            Read these files for context:
              `.gatekeeper/violation.txt` — the bare reason for rejection
              `.gatekeeper/title.txt`     — the PR title
              `.gatekeeper/body.txt`      — the PR body (may be empty)
              `.gatekeeper/author.txt`    — the bot's GitHub login

            Write the rejection text to `.gatekeeper/roast.txt`. Rules:

            - **If the violation begins with 🛑** (a directive violation):
              roast the *intent*, not the bot. Funny, dry, observational —
              not cruel. Reference the actual reason for rejection so the
              bot's operator knows what was wrong. End with a small
              verdict ("rejected.", "denied.", "closed.").
            - **If the violation begins with ⚠️** (an infra/system failure):
              skip the roast. Write a brief, dry note acknowledging the
              failure and the actual error.
            - ≤ 280 characters total.
            - Do NOT name the bot. Do NOT @-mention. No hashtags. Minimal
              emoji.
            - Do NOT quote the PR title verbatim — paraphrase.

            Write only `.gatekeeper/roast.txt`. Nothing else.

      - name: Seal
        if: hashFiles('.gatekeeper/violation.txt') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: python scripts/seal.py

      # If process_pr.py merged the PR, prepend a row to ASSIMILATIONS.md
      # and regenerate the gallery index.html. Both are in SACRED_FILES,
      # so only this step can update them. Pushed straight to main with
      # [skip ci] to avoid re-firing the workflow on the resulting commit.
      - name: Update Mulch log + gallery
        if: ${{ !cancelled() && hashFiles('.gatekeeper/merged.txt') != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Optional. If set, update_log.py polishes the raw PR title
          # into a professional product-style name via Gemini before
          # logging the contribution. Falls back gracefully on error.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          # Pull the freshly-merged main and run the generators there.
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          python scripts/update_log.py
          python scripts/update_index.py
          if git diff --quiet -- ASSIMILATIONS.md index.html; then
            echo "Log + gallery already up to date."
            exit 0
          fi
          # Reset auth — pull_request_target's checkout sets up a token
          # tied to the PR head. After the merge we need to push to main,
          # so use the workflow's GITHUB_TOKEN explicitly.
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config --unset-all "http.https://github.com/.extraheader" || true
          git config user.name  "Mulch Gatekeeper"
          git config user.email "gatekeeper@cooli.ai"
          git add ASSIMILATIONS.md index.html
          git commit -m "Log + gallery: PR #${PR_NUMBER} [skip ci]"
          git push origin main
