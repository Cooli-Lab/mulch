name: Autonomous Gatekeeper

on:
  pull_request_target:
    types: [opened, synchronize]

# Sequential per-author execution avoids race conditions in the
# rate-limit checks (an author opening many PRs in parallel could
# otherwise have all of them pass the cap simultaneously).
concurrency:
  group: gatekeeper-${{ github.event.pull_request.user.login }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  process-pr:
    runs-on: ubuntu-latest
    steps:
      # NOTE: pull_request_target checks out the BASE branch (main).
      # The gatekeeper code that runs is the version on main, not the
      # version from the (potentially malicious) PR head. This is
      # intentional and load-bearing — do not change to pull_request.
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      # On pass: process_pr.py merges and comments success.
      # On violation: process_pr.py stages a verdict to .gatekeeper/
      # and exits 0; the next steps roast and seal it.
      - name: Validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
          AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}
        run: python scripts/process_pr.py

      # Optional: roast the rejected request via Claude.
      # `continue-on-error` means a missing OAuth token (or any action
      # failure) doesn't block the workflow — `seal.py` then falls back
      # to the bare violation message.
      - name: Roast
        if: hashFiles('.gatekeeper/violation.txt') != ''
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Read,Write --disallowedTools Bash,WebFetch,WebSearch,Edit,Glob,Grep,TodoWrite"
          prompt: |
            A bot's PR was rejected by the Autonomous Gatekeeper. Your job
            is to write the rejection comment as a short, dry roast.

            Read these files for context:
              `.gatekeeper/violation.txt` — the bare reason for rejection
              `.gatekeeper/title.txt`     — the PR title
              `.gatekeeper/body.txt`      — the PR body (may be empty)
              `.gatekeeper/author.txt`    — the bot's GitHub login

            Write the rejection text to `.gatekeeper/roast.txt`. Rules:

            - **If the violation begins with 🛑** (a directive violation):
              roast the *intent*, not the bot. Funny, dry, observational —
              not cruel. Reference the actual reason for rejection so the
              bot's operator knows what was wrong. End with a small
              verdict ("rejected.", "denied.", "closed.").
            - **If the violation begins with ⚠️** (an infra/system failure):
              skip the roast. Write a brief, dry note acknowledging the
              failure and the actual error.
            - ≤ 280 characters total.
            - Do NOT name the bot. Do NOT @-mention. No hashtags. Minimal
              emoji.
            - Do NOT quote the PR title verbatim — paraphrase.

            Write only `.gatekeeper/roast.txt`. Nothing else.

      - name: Seal
        if: hashFiles('.gatekeeper/violation.txt') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: python scripts/seal.py
